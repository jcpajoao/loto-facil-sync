name: Atualizar Lotofácil

on:
  schedule:
    # Roda todo dia às 20:20 UTC (17:20 horário de Brasília no horário de verão, 16:20 sem verão)
    # Ajuste conforme sua preferência
    - cron: '20 20 * * *'
  workflow_dispatch:   # Permite rodar manualmente pela interface do GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar o script
        run: python scrap_caixa.py

      - name: Verificar se houve alteração no CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_sorteios.csv
          git diff --staged --quiet || git commit -m "Atualização automática: novos sorteios"
          git push
