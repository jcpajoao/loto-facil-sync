name: Atualizar Lotofácil

on:
  workflow_dispatch:    # permite rodar manualmente
  schedule:
    - cron: '20 20 * * *'   # todo dia às 20:20 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Executar o script
        run: python scrap_caixa.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_sorteios.csv
          git diff --staged --quiet || git commit -m "Atualização automática: novos sorteios"
          git push
